name: 🔍 Deploy Preview

on:
  push:
    branches:
      - develop
      - 'feature/**'
  pull_request:
    branches:
      - main

jobs:
  deploy-preview:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Vercel CLI
        run: npm install -g vercel

      - name: Deploy to Vercel (Preview)
        run: |
          url=$(vercel --token ${{ secrets.VERCEL_TOKEN }} --yes 2>&1 | grep -o 'https://[^ ]*vercel\.app' | head -1)
          echo "## 🔍 Preview Deployment" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "✅ **Preview URL:** $url" >> $GITHUB_STEP_SUMMARY
          echo "preview_url=$url" >> $GITHUB_OUTPUT
        id: deploy
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}

      - name: Comment PR with preview URL
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const url = '${{ steps.deploy.outputs.preview_url }}';
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## 🔍 Preview Deployment\n\n✅ Ton preview est prêt !\n\n🔗 **URL Preview:** ${url}\n\n> Teste tout et valide avant de merger en \`main\`.`
            });
